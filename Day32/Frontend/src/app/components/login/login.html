<div class="row justify-content-center">

  <div class="col-md-4">

    <div class="card shadow">

      <div class="card-body">

        <h3 class="mb-3">
          Login
        </h3>

        <form (ngSubmit)="login()">

          <div class="mb-3">

            <label>
              Username
            </label>

            <input
              type="text"
              class="form-control"
              [(ngModel)]="username"
              name="username">

          </div>

          <div class="mb-3">

            <label>
              Password
            </label>

            <input
              type="password"
              class="form-control"
              [(ngModel)]="password"
              name="password">

          </div>

          <button
            class="btn btn-primary w-100" [disabled]="loading">
            @if(loading){
                <span class="spinner-border spinner-border-sm me-2"></span>
            }
            @else{
                Login
            }
          </button>

        </form>

      </div>

    </div>

  </div>

</div>
