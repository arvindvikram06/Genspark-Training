<h2>
    <!-- interpolation -->
    Welcome to the Customers Page, {{customer.username}}!
    <i [class]="styclass" (click)="toggleLike()"></i>
</h2>
<table border="1">
    <tr [class] = "tabclass">
       <td>
            <!-- Property Binding -->
            <input type = "text" [value]="customer.username"/>
            <!-- Two-way Data Binding -->
            <input type = "text" [(ngModel)]="customer.username"/>
       </td>
       <td>
            <!-- Event Binding -->
            <button (click)="handleChangeClick()">Click Me</button>
       </td>
    </tr>
